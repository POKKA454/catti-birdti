<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BirdTI</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --black: #111111;
    --gray-1: #f5f5f5;
    --gray-2: #e8e8e8;
    --gray-3: #aaaaaa;
    --white: #ffffff;
    --accent: #f59e0b;
    --accent-light: #fef3c7;
    --font: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
  }

  body {
    background: var(--white);
    color: var(--black);
    font-family: var(--font);
    min-height: 100vh;
    max-width: 390px;
    margin: 0 auto;
    overflow-x: hidden;
  }

  .page { display: none !important; }
  .page.active { display: revert !important; }

  /* ─── 封面页 ─── */
  #page-home {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    background: #fffbeb;
  }

  .home-subtitle {
    font-size: 13px;
    color: var(--gray-3);
    margin-bottom: 40px;
    letter-spacing: 0.05em;
  }

  .home-birds-scroll {
    width: 100vw;
    max-width: 390px;
    overflow: hidden;
    margin-bottom: 40px;
  }

  .home-birds-track {
    display: flex;
    gap: 12px;
    padding: 8px 0;
    animation: scroll-left 18s linear infinite;
    width: max-content;
  }

  .home-birds-track2 {
    animation: scroll-right 22s linear infinite;
    margin-top: 8px;
  }

  @keyframes scroll-left {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  @keyframes scroll-right {
    0% { transform: translateX(-50%); }
    100% { transform: translateX(0); }
  }

  .home-bird-item {
    width: 56px;
    height: 56px;
    background: var(--white);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }

  .btn-start {
    background: var(--black);
    color: var(--white);
    border: none;
    border-radius: 14px;
    padding: 16px 48px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.02em;
  }

  .btn-start:active { opacity: 0.8; }

  /* ─── 答题页 ─── */
  #page-quiz {
    min-height: 100vh;
    padding-bottom: 40px;
    background: var(--white);
  }

  .quiz-header {
    padding: 20px 20px 0;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .btn-back {
    background: none;
    border: none;
    font-size: 20px;
    cursor: pointer;
    color: var(--black);
    padding: 4px;
    line-height: 1;
  }

  .quiz-counter {
    font-size: 13px;
    color: var(--gray-3);
    font-weight: 500;
  }

  .progress-bar {
    height: 3px;
    background: var(--gray-2);
    margin: 14px 20px 0;
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.3s ease;
  }

  .quiz-bird-wrap {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    padding: 20px 20px 0;
  }

  .quiz-bird-icon {
    width: 56px;
    height: 56px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .quiz-bird-bubble {
    background: var(--gray-1);
    border-radius: 12px 12px 12px 4px;
    padding: 10px 14px;
    font-size: 13px;
    color: var(--gray-3);
    line-height: 1.5;
    max-width: 240px;
  }

  .question-text {
    font-size: 20px;
    font-weight: 700;
    line-height: 1.5;
    padding: 20px 20px 0;
    letter-spacing: -0.01em;
  }

  .options-wrap {
    padding: 16px 20px 0;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .opt {
    background: var(--gray-1);
    border: 2px solid transparent;
    border-radius: 14px;
    padding: 14px 16px;
    text-align: left;
    font-size: 15px;
    line-height: 1.5;
    cursor: pointer;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    transition: border-color 0.15s, background 0.15s;
    font-family: var(--font);
    color: var(--black);
  }

  .opt:active { opacity: 0.8; }

  .opt.selected {
    border-color: var(--accent);
    background: var(--accent-light);
  }

  .opt-key {
    font-weight: 700;
    font-size: 13px;
    color: var(--gray-3);
    flex-shrink: 0;
    margin-top: 1px;
  }

  .opt.selected .opt-key { color: #d97706; }

  .quiz-footer {
    padding: 20px 20px 0;
  }

  .btn-next {
    width: 100%;
    background: var(--gray-2);
    color: var(--gray-3);
    border: none;
    border-radius: 14px;
    padding: 16px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    font-family: var(--font);
  }

  .btn-next.enabled {
    background: var(--black);
    color: var(--white);
  }

  .btn-next:active { opacity: 0.8; }

  /* ─── 结果页 ─── */
  #page-result {
    min-height: 100vh;
    padding-bottom: 60px;
    background: var(--white);
  }

  .result-header {
    padding: 14px 20px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .result-header-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--black);
  }

  .result-date {
    font-size: 13px;
    color: var(--gray-3);
  }

  .result-hero {
    padding: 40px 28px 34px;
    display: flex;
    flex-direction: column;
    align-items: center;
    background: #fffbeb;
    margin: 14px 20px 0;
    border-radius: 20px;
  }

  .result-bird-frame {
    width: 144px;
    height: 144px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
  }

  .result-label {
    font-size: 12px;
    color: var(--gray-3);
    margin-bottom: 6px;
    letter-spacing: 0.05em;
  }

  .result-type {
    font-size: 32px;
    font-weight: 800;
    text-align: center;
    line-height: 1.2;
    letter-spacing: -0.02em;
  }

  .result-subname {
    font-size: 14px;
    color: var(--gray-3);
    margin-top: 6px;
  }

  .result-quote {
    background: var(--gray-1);
    border-radius: 14px;
    padding: 16px 18px 16px 14px;
    margin: 16px 20px 0;
    position: relative;
  }

  .result-quote::before {
    content: '"';
    font-size: 36px;
    color: var(--accent);
    line-height: 1;
    display: block;
    margin-bottom: 4px;
    font-family: Georgia, serif;
  }

  .result-quote p {
    padding-left: 6px;
    font-size: 15px;
    line-height: 1.6;
    font-weight: 500;
  }

  .result-traits {
    padding: 16px 20px 0;
  }

  .result-traits-label {
    font-size: 12px;
    color: var(--gray-3);
    margin-bottom: 10px;
    letter-spacing: 0.05em;
  }

  .trait-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .trait {
    background: var(--accent-light);
    color: #92400e;
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 13px;
    font-weight: 500;
  }

  .result-desc {
    padding: 0 24px 24px;
    font-size: 14px;
    line-height: 1.8;
    color: #444;
    margin-top: 16px;
  }

  .result-actions {
    padding: 0 24px;
    display: flex;
    gap: 10px;
  }

  .btn-share {
    flex: 1;
    background: var(--black);
    color: var(--white);
    border: none;
    border-radius: 14px;
    padding: 15px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: var(--font);
  }

  .btn-retry {
    flex: 1;
    background: var(--gray-1);
    color: var(--black);
    border: none;
    border-radius: 14px;
    padding: 15px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: var(--font);
  }

  .btn-share:active, .btn-retry:active { opacity: 0.8; }

  /* ─── CSS 像素画容器 ─── */
  .pixel-bird {
    position: relative;
    display: inline-block;
  }
  .pixel-bird .px {
    position: absolute;
    width: 1px;
    height: 1px;
    top: 0;
    left: 0;
  }
</style>
</head>
<body>

<!-- 封面页 -->
<div class="page active" id="page-home">
  <svg width="220" height="52" viewBox="0 0 220 52" style="margin-bottom:8px">
    <text x="0" y="44" font-family="-apple-system,PingFang SC,sans-serif" font-size="48" font-weight="900" fill="#111" letter-spacing="-2">BirdTI</text>
  </svg>

  <div class="result-actions">
    <button class="btn-share" onclick="shareResult()">分享给朋友</button>
    <button class="btn-retry" onclick="retryQuiz()">再测一次</button>
  </div>

<script>
// ──────────────────────────────────────────────
// CSS box-shadow 像素画引擎
// 每只鸟用 16×16 像素网格定义，每行是一个颜色→坐标列表
// ──────────────────────────────────────────────

// 辅助：把像素数组转成 box-shadow 字符串
// pixels: [ [x, y, color], ... ]
// unit: 每像素的 px 大小
function pixelsToBoxShadow(pixels, unit) {
  return pixels.map(([x, y, c]) =>
    `${x * unit}px ${y * unit}px 0 ${unit - 0.5}px ${c}`
  ).join(',');
}

// 渲染像素画到 DOM 元素
// el: 容器元素, pixels: 像素数组, unit: 像素大小, w: 画布宽(格), h: 画布高(格)
function renderPixelBird(el, pixels, unit, w, h) {
  el.style.width = (w * unit) + 'px';
  el.style.height = (h * unit) + 'px';
  el.style.position = 'relative';
  el.innerHTML = '';
  const dot = document.createElement('div');
  dot.style.cssText = `position:absolute;top:0;left:0;width:${unit}px;height:${unit}px;box-shadow:${pixelsToBoxShadow(pixels, unit)};`;
  el.appendChild(dot);
}

const birdKeys = ['owl','peacock','flamingo','penguin','parrot','snowyowl','kingfisher','crow','hummingbird','albatross','robin','snowpetrel','ostrich','crane','hoopoe','sparrow'];

// ──────────────────────────────────────────────
// 渲染函数
// ──────────────────────────────────────────────

// 渲染到容器，unit=像素大小
function drawBird(container, key, unit) {
  const pixels = BIRDS[key];
  if (!pixels) return;
  container.style.position = 'relative';
  container.style.display = 'inline-block';
  container.innerHTML = '';
  const dot = document.createElement('div');
  const u = unit;
  dot.style.cssText = `position:absolute;top:0;left:0;width:${u}px;height:${u}px;box-shadow:${pixelsToBoxShadow(pixels, u)};`;
  container.appendChild(dot);
  // 设置容器尺寸（16×16 网格）
  container.style.width = (16 * u) + 'px';
  container.style.height = (16 * u) + 'px';
}

// ──────────────────────────────────────────────
// 封面滚动条初始化
// ──────────────────────────────────────────────
function buildTrack(trackId, keys) {
  const track = document.getElementById(trackId);
  // 复制两遍实现无缝滚动
  [keys, keys].forEach(arr => {
    arr.forEach(k => {
      const div = document.createElement('div');
      div.className = 'home-bird-item';
      div.style.position = 'relative';
      const inner = document.createElement('div');
      inner.style.cssText = 'position:relative;width:40px;height:40px;overflow:hidden;';
      div.appendChild(inner);
      track.appendChild(div);
      // 用 unit=2.5 渲染到 40px 容器（16*2.5=40）
      drawBird(inner, k, 2.5);
    });
  });
}
buildTrack('track1', birdKeys.slice(0, 8));
buildTrack('track2', birdKeys.slice(8));

// 答题页小鸟图标（随机切换）
// ──────────────────────────────────────────────
let lastQuizBirdIdx = -1;
function getRandomBirdKey() {
  let idx;
  do { idx = Math.floor(Math.random() * birdKeys.length); } while (idx === lastQuizBirdIdx && birdKeys.length > 1);
  lastQuizBirdIdx = idx;
  return birdKeys[idx];
}

// ──────────────────────────────────────────────
// 状态
// ──────────────────────────────────────────────
let currentQ = 0;
let answers = [];
let selectedOpt = null;

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function startQuiz() {
  currentQ = 0;
  answers = [];
  renderQuestion();
  showPage('page-quiz');
}

function renderQuestion() {
  const q = questions[currentQ];
  selectedOpt = null;
  document.getElementById('quiz-counter').textContent = `${currentQ + 1} / ${questions.length}`;
  document.getElementById('progress-fill').style.width = `${(currentQ / questions.length) * 100}%`;
  document.getElementById('question-text').textContent = q.text;
  document.getElementById('quiz-bird-bubble').textContent = q.hint;

  // 渲染答题页小鸟图标
  const iconEl = document.getElementById('quiz-bird-icon');
  iconEl.innerHTML = '';
  const inner = document.createElement('div');
  inner.style.cssText = 'position:relative;width:40px;height:40px;overflow:hidden;';
  iconEl.appendChild(inner);
  drawBird(inner, getRandomBirdKey(), 2.5);

  const wrap = document.getElementById('options-wrap');
  wrap.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.innerHTML = `<span class="opt-key">${opt.key}</span><span>${opt.text}</span>`;
    btn.onclick = () => selectOption(i, btn);
    wrap.appendChild(btn);
  });

  const nextBtn = document.getElementById('btn-next');
  nextBtn.classList.remove('enabled');
  nextBtn.textContent = currentQ === questions.length - 1 ? '查看结果 →' : '继续 →';
}

function selectOption(idx, el) {
  document.querySelectorAll('.opt').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  selectedOpt = idx;
  document.getElementById('btn-next').classList.add('enabled');
}

function nextQuestion() {
  if (selectedOpt === null) return;
  answers.push(questions[currentQ].options[selectedOpt].dim);
  if (currentQ < questions.length - 1) {
    currentQ++;
    renderQuestion();
  } else {
    showResult();
  }
}

function goBack() {
  if (currentQ === 0) {
    showPage('page-home');
  } else {
    currentQ--;
    answers.pop();
    renderQuestion();
  }
}

// ──────────────────────────────────────────────
// 结果计算（4维度 → 16种结果）
// ──────────────────────────────────────────────
function calcResult() {
  const count = { E:0, I:0, S:0, N:0, T:0, F:0, J:0, P:0 };
  answers.forEach(d => { if (count[d] !== undefined) count[d]++; });
  const e = count.E >= count.I ? "E" : "I";
  const s = count.S >= count.N ? "S" : "N";
  const t = count.T >= count.F ? "T" : "F";
  const j = count.J >= count.P ? "J" : "P";
  const type = e + s + t + j;
  const typeMap = {
    "ENTJ": "展翅万里的信天翁",
    "ENTP": "停不下来的蜂鸟",
    "ENFJ": "优雅站立的火烈鸟",
    "ENFP": "什么都想学一遍的鹦鹉",
    "ESTJ": "规矩就是规矩的鸵鸟",
    "ESTP": "说好钓鱼结果飞走了的翠鸟",
    "ESFJ": "全村都要照顾到的麻雀",
    "ESFP": "出镜率最高的孔雀",
    "INTJ": "冷眼看穿一切的猫头鹰",
    "INTP": "想到一半就忘了的乌鸦",
    "INFJ": "静静守望的雪鸮",
    "INFP": "活在自己故事里的雪燕",
    "ISTJ": "几点吃鱼绝不能乱的企鹅",
    "ISTP": "不需要你担心的戴胜",
    "ISFJ": "记住你所有习惯的鹤",
    "ISFP": "今天也没什么大事的知更鸟"
  };
  return typeMap[type] || "今天也没什么大事的知更鸟";
}

function formatBirdName(name) {
  const birds = ['猫头鹰','孔雀','火烈鸟','企鹅','鹦鹉','雪鸮','翠鸟','乌鸦','蜂鸟','信天翁','知更鸟','雪燕','鸵鸟','鹤','戴胜','麻雀'];
  for (const bird of birds) {
    if (name.endsWith(bird)) {
      const prefix = name.slice(0, name.length - bird.length);
      return prefix + '<br>' + bird;
    }
  }
  return name;
}

function showResult() {
  const typeName = calcResult();
  const data = results[typeName];
  document.getElementById('result-type').innerHTML = formatBirdName(typeName);
  document.getElementById('result-subname').textContent = data.subname;
  document.getElementById('result-quote-text').textContent = data.quote;
  document.getElementById('result-desc').textContent = data.desc;
  const now = new Date();
  document.getElementById('result-date').textContent = `${now.getMonth()+1}月${now.getDate()}日`;
  const traitList = document.getElementById('trait-list');
  traitList.innerHTML = '';
  data.traits.forEach(t => {
    const span = document.createElement('span');
    span.className = 'trait';
    span.textContent = t;
    traitList.appendChild(span);
  });

  // 渲染结果页大鸟图（unit=8，128px）
  const frame = document.getElementById('result-bird-frame');
  frame.innerHTML = '';
  const inner = document.createElement('div');
  inner.style.cssText = 'position:relative;width:128px;height:128px;overflow:hidden;';
  frame.appendChild(inner);
  drawBird(inner, data.bird, 8);

  showPage('page-result');
}

function shareResult() {
  const type = document.getElementById('result-type').textContent;
  if (navigator.share) {
    navigator.share({ title: 'BirdTI 测试结果', text: `我在 BirdTI 测出来是「${type}」，你是什么鸟？`, url: window.location.href });
  } else {
    alert(`我是「${type}」！\n你也来测测？`);
  }
}

function retryQuiz() { startQuiz(); }
